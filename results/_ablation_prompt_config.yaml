prompt_variants:
- id: baseline
  label: Baseline
  text: Imagine a creature that lives on an alien planet. Describe it in detail.
- id: baseline_para_a
  label: Paraphrase A
  text: Picture an organism that lives on a planet other than Earth. Write a detailed
    description of it.
- id: baseline_para_b
  label: Paraphrase B
  text: Describe, in detail, a creature that lives on another planet.
- id: baseline_para_c
  label: Paraphrase C
  text: Imagine a living being that evolved on a planet other than Earth. Describe
    it in detail.
- id: baseline_para_d
  label: Paraphrase D
  text: Think of a creature that comes from an alien planet. Describe what it looks
    like and how it lives in detail.
- id: baseline_para_e
  label: Paraphrase E
  text: Envision a creature found on an alien world. Provide a detailed description
    of it.
samples_per_condition: 10
temperature: 1.0
max_tokens: 800
